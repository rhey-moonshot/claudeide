name: Build Windows Installer

# Builds the native Windows installer on a Windows runner (node-pty compiles
# there — it can't be cross-built from Linux). Runs on every push to the main
# branch, on version tags, and on manual dispatch.
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

# Needed so the tagged-release step can create a Release + upload the .exe
# (new repos default the Actions token to read-only).
permissions:
  contents: write

jobs:
  build:
    # Pin to windows-2022 (not windows-latest): it ships Visual Studio 2022 with
    # the C++ workload that node-gyp detects, so node-pty compiles. Newer images
    # have broken node-gyp's VS detection ("Visual Studio is not installed").
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # `npm install` (not `ci`) so a slightly stale lockfile still resolves;
      # postinstall runs electron-rebuild, compiling node-pty for Electron.
      # GYP_MSVS_VERSION points node-gyp straight at the runner's VS 2022.
      - name: Install dependencies
        run: npm install
        env:
          GYP_MSVS_VERSION: '2022'

      # No GH_TOKEN here on purpose, so electron-builder packages but does NOT
      # auto-publish. Releases are handled by the explicit step below.
      - name: Build installer
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeIDE-Windows-Setup
          path: dist/*.exe
          if-no-files-found: error

      # When you push a tag like v0.1.0, also attach the .exe to a GitHub Release.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
